<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <title>TurCOP - Pontos Turísticos de Belém</title>
  <style>
    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: url('https://blog.archtrends.com/wp-content/uploads/2024/11/belemdoparaabre.jpeg') no-repeat center center fixed;
      background-size: cover;
      margin: 0;
      color: #ffffff;
      text-align: center;
    }

    .fundo-escuro {
      background-color: rgba(0, 0, 0, 0.6); /* escurece levemente para dar contraste */
      min-height: 100vh;
      padding-bottom: 50px;
    }

    .top-bar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 20px 40px;
      background-color: rgba(0, 100, 0, 0.8);
      border-bottom: 2px solid #004d00;
    }

    .logo {
      font-size: 28px;
      font-weight: bold;
      color: #ffffff;
    }

    .search-container {
      position: relative;
    }

    .search-toggle {
      background-color: #004d00;
      color: white;
      padding: 10px 20px;
      font-size: 16px;
      border: none;
      border-radius: 5px;
      cursor: pointer;
    }

    .search-box {
      margin-top: 10px;
      display: none;
      position: absolute;
      right: 0;
    }

    .search-box input,
    .search-central input {
      padding: 12px;
      font-size: 16px;
      width: 300px;
      border: 2px solid #006400;
      border-radius: 5px;
    }

    .search-central {
      margin: 30px auto;
    }

    h1 {
      color: #e0ffe0;
      margin-top: 30px;
      text-shadow: 1px 1px 3px #003300;
    }

    ul {
      list-style-type: none;
      padding: 0;
      margin-top: 30px;
    }

    li {
      background-color: rgba(255, 255, 255, 0.8);
      color: #003300;
      margin: 10px auto;
      padding: 15px;
      border-radius: 8px;
      width: 80%;
      max-width: 500px;
      transition: 0.3s;
      font-weight: bold;
    }

    li:hover {
      background-color: rgba(255, 255, 255, 1);
    }

    #resultado {
      margin-top: 40px;
      padding: 20px;
      color: #ffffff;
      font-weight: bold;
      font-size: 18px;
      text-shadow: 1px 1px 2px #003300;
    }

    @media (max-width: 600px) {
      .search-box input,
      .search-central input {
        width: 150px;
      }

      li {
        width: 90%;
      }

      .top-bar {
        flex-direction: column;
        align-items: flex-start;
      }

      .search-container {
        align-self: flex-end;
        margin-top: 10px;
      }
    }
  </style>
</head>
<body>
  <div class="fundo-escuro">
    <!-- Barra superior -->
    <div class="top-bar">
      <div class="logo">TurCOP</div>
      <div class="search-container">
        <button class="search-toggle" onclick="toggleSearch()">Pesquisar</button>
        <div class="search-box" id="searchBox">
          <input type="text" id="searchTop" placeholder="Buscar ponto turístico..." onkeyup="filtrar()">
        </div>
      </div>
    </div>

    <h1>Pontos Turísticos de Belém - COP 30</h1>

    <!-- Barra de pesquisa central -->
    <div class="search-central">
      <input type="text" id="searchCentral" placeholder="Buscar ponto turístico..." onkeyup="filtrar()">
    </div>

    <!-- Lista de pontos turísticos -->
    <ul id="lista">
      <li>Estação das Docas</li>
      <li>Ver-o-Peso</li>
      <li>Mangal das Garças</li>
      <li>Basílica de Nazaré</li>
      <li>Forte do Presépio</li>
      <li>Ilha do Combu</li>
      <li>Parque Zoobotânico Mangal</li>
      <li>Praça da República</li>
      <li>Mercado de Carne Francisco Bolonha</li>
    </ul>

    <!-- Resultado da busca -->
    <div id="resultado"></div>
  </div>

  <script>
    function toggleSearch() {
      const searchBox = document.getElementById('searchBox');
      searchBox.style.display = searchBox.style.display === 'block' ? 'none' : 'block';
    }

    function filtrar() {
      const inputTop = document.getElementById('searchTop');
      const inputCentral = document.getElementById('searchCentral');
      const filtroTop = inputTop?.value.toLowerCase() || "";
      const filtroCentral = inputCentral?.value.toLowerCase() || "";
      const filtro = filtroTop || filtroCentral;

      const lista = document.getElementById('lista');
      const itens = lista.getElementsByTagName('li');
      let encontrados = 0;

      for (let i = 0; i < itens.length; i++) {
        const texto = itens[i].textContent || itens[i].innerText;
        if (texto.toLowerCase().includes(filtro)) {
          itens[i].style.display = '';
          encontrados++;
        } else {
          itens[i].style.display = 'none';
        }
      }

      const resultado = document.getElementById('resultado');
      if (filtro) {
        resultado.innerText = encontrados > 0
          ? `Encontramos ${encontrados} resultado(s) para "${filtro}"`
          : `Nenhum resultado encontrado para "${filtro}"`;
      } else {
        resultado.innerText = '';
      }
    }
  </script>
</body>
</html>
