<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <title>TurCOP - Pontos Turísticos de Belém</title>
  <link rel="stylesheet" href="style/search.css">
  <link rel="stylesheet" href="components/menu.css">
  <link rel="stylesheet" href="../style/global.css">
  <link rel="stylesheet" href="menu.css">
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" />
  

  <!-- CSS do Leaflet -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />
  <!-- JS do Leaflet -->
  <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>


</head>
<body>
  <div class="overlay">
    <div class="top-bar">
      <div class="logo">TurCOP</div>

      <nav>
          <div class="menu-option-div">
              <span class="material-symbols-outlined">home</span>
              <a href="home.html">Home</a>
          </div>
          <div class="menu-option-div">
              <span class="material-symbols-outlined">search</span>
              <a href="search.html">Pesquisar</a>
          </div>
      </nav>
    </div>

    <div class="search-container">
      <div class="search-wrapper">
        <input
          type="text"
          id="searchCentral"
          placeholder="Buscar por nome do ponto turístico..."
          aria-label="Buscar ponto turístico"
        >
        <button type="button" onclick="searchList()">🔍</button>
      </div>

      <div id="lista">
      </div>

      <div id="resultado"></div>
    </div>

    <div class="footer">
      <p>TurCOP - Todos os direitos reservados &copy; 2025</p>
    </div>
  </div>
  <script src="src/Backend.js"></script>
  <script src="src/search.js"></script>
</body>
</html>
